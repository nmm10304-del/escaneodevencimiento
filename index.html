<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Almacén - Vida Útil</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; font-size: 26px; }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            min-height: 250px;
        }
        .resultado-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #eef2f7;
            text-align: left;
        }
        .resultado-box h3 { margin: 0 0 10px 0; color: #0056b3; }
        .dato { font-size: 18px; margin: 8px 0; color: #444; }
        .resaltado { font-weight: bold; color: #28a745; font-size: 24px; }
        .error { color: #dc3545; font-weight: bold; }
        .info-status { font-size: 13px; color: #555; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ESCANEA EL PRODUCTO</h2>
    <p>Apunta al código EAN con la cámara trasera</p>
    
    <div id="reader"></div>

    <div class="resultado-box">
        <h3>Resultado del Escaneo:</h3>
        <div id="txt-desc" class="dato"><b>DESCRIPCIÓN:</b> ---</div>
        <div id="txt-vida" class="dato"><b>Vida Útil:</b> <span id="vida-val" class="resaltado">---</span></div>
    </div>
    <div id="txt-status" class="info-status">Cargando datos del almacén...</div>
</div>

<script>
    let baseDatosUnificada = {};
    let html5QrCode;

    // 1. Cargar las bases de datos FV-01 y FV-02 primero
    function iniciarAplicacion() {
        Promise.all([
            fetch('FV-01.json').then(res => res.json()),
            fetch('FV-02.json').then(res => res.json())
        ])
        .then(([data1, data2]) => {
            baseDatosUnificada = Object.assign({}, data1, data2);
            document.getElementById('txt-status').innerText = "✅ ¡Bases de datos listas para escanear!";
            
            // Una vez cargados los datos, encendemos la cámara trasera
            encenderCamaraTrasera();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('txt-status').innerHTML = "<span class='error'>⚠️ Error cargando archivos JSON. La cámara trasera iniciará de todos modos.</span>";
            encenderCamaraTrasera();
        });
    }

    // 2. Forzar al navegador a usar la cámara de atrás ('environment')
    function encenderCamaraTrasera() {
        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 10, 
            qrbox: { width: 280, height: 160 } 
        };

        // 'environment' le dice al celular: "Usa la cámara del entorno (la de atrás)"
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            console.error("No se pudo iniciar la cámara trasera, intentando modo genérico:", err);
            // Si el celular es muy antiguo y no entiende 'environment', usa la que esté disponible
            html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
        });
    }

    // 3. Qué hacer al detectar el EAN
    function onScanSuccess(decodedText, decodedResult) {
        const eanLimpio = decodedText.trim();
        const producto = baseDatosUnificada[eanLimpio];

        if (producto) {
            // Muestra la descripción y vida útil buscando cualquier variación de mayúsculas/minúsculas
            document.getElementById('txt-desc').innerHTML = `<b>DESCRIPCIÓN:</b> ${producto.descripcion || producto.DESCRIPCION || producto.description || '---'}`;
            document.getElementById('vida-val').innerText = producto.vida_util || producto.VIDA_UTIL || '---';
        } else {
            document.getElementById('txt-desc').innerHTML = `<span class='error'>Código detectado: ${eanLimpio} <br>Producto no encontrado en las listas</span>`;
            document.getElementById('vida-val').innerText = "---";
        }
    }

    // Arrancar el proceso al abrir la web
    window.onload = iniciarAplicacion;
</script>
</body>
</html>
