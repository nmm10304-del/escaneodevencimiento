<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Almacén Universal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; font-size: 26px; }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            min-height: 250px;
        }
        .resultado-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #eef2f7;
            text-align: left;
        }
        .resultado-box h3 { margin: 0 0 10px 0; color: #0056b3; }
        .dato { font-size: 18px; margin: 8px 0; color: #444; }
        .resaltado { font-weight: bold; color: #28a745; font-size: 24px; }
        .error { color: #dc3545; font-weight: bold; }
        .info-status { font-size: 13px; color: #555; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ESCANEA EL PRODUCTO</h2>
    <p>Apunta al código EAN con la cámara de atrás</p>
    
    <div id="reader"></div>

    <div class="resultado-box">
        <h3>Resultado del Escaneo:</h3>
        <div id="txt-desc" class="dato"><b>DESCRIPCIÓN:</b> ---</div>
        <div id="txt-vida" class="dato"><b>Vida Útil:</b> <span id="vida-val" class="resaltado">---</span></div>
    </div>
    <div id="txt-status" class="info-status">Vinculando almacén...</div>
</div>

<script>
    let baseDatosUnificada = {};
    let html5QrCode;

    // 1. Descargar las bases de datos de GitHub de inmediato
    function cargarDatosYArrancar() {
        Promise.all([
            fetch('FV-01.json').then(res => res.json()),
            fetch('FV-02.json').then(res => res.json())
        ])
        .then(([data1, data2]) => {
            baseDatosUnificada = Object.assign({}, data1, data2);
            document.getElementById('txt-status').innerText = "✅ Sistema listo y conectado.";
            arrancarCamaraUniversal();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('txt-status').innerHTML = "<span class='error'>⚠️ Aviso: Cargando cámara sin base de datos (verifica los JSON).</span>";
            arrancarCamaraUniversal();
        });
    }

    // 2. Encendido universal (Funciona en Brave, Safari, Chrome e iOS/Android)
    function arrancarCamaraUniversal() {
        html5QrCode = new Html5Qrcode("reader");
        
        // Esta configuración obliga al sistema operativo a entregar la cámara trasera
        // ignorando las restricciones de privacidad del navegador
        const camaraConfig = { 
            facingMode: { exact: "environment" } 
        };

        const escanerConfig = { 
            fps: 15, 
            qrbox: { width: 280, height: 160 } 
        };

        // Intentar encender la cámara trasera estricta
        html5QrCode.start(camaraConfig, escanerConfig, onScanSuccess)
        .catch(err => {
            console.warn("No se detectó cámara trasera estricta, usando modo flexible de respaldo:", err);
            // Respaldo por si es una computadora de escritorio con una sola WebCam
            html5QrCode.start({ facingMode: "environment" }, escanerConfig, onScanSuccess)
            .catch(err2 => {
                document.getElementById('txt-status').innerHTML = "<span class='error'>No se pudo acceder a ninguna cámara. Revisa los permisos de tu dispositivo.</span>";
            });
        });
    }

    // 3. Respuesta al detectar el código EAN
    function onScanSuccess(decodedText, decodedResult) {
        const eanLimpio = decodedText.trim();
        const producto = baseDatosUnificada[eanLimpio];

        if (producto) {
            document.getElementById('txt-desc').innerHTML = `<b>DESCRIPCIÓN:</b> ${producto.descripcion || producto.DESCRIPCION || producto.description || '---'}`;
            document.getElementById('vida-val').innerText = producto.vida_util || producto.VIDA_UTIL || '---';
        } else {
            document.getElementById('txt-desc').innerHTML = `<span class='error'>Código: ${eanLimpio} <br>Producto no registrado</span>`;
            document.getElementById('vida-val').innerText = "---";
        }
    }

    // Iniciar automáticamente al abrir la página
    window.onload = cargarDatosYArrancar;
</script>
</body>
</html>
