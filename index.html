<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Almacén - Vida Útil</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .resultado-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #eef2f7;
            text-align: left;
        }
        .resultado-box h3 { margin: 0 0 10px 0; color: #0056b3; }
        .dato { font-size: 18px; margin: 5px 0; color: #444; }
        .resaltado { font-weight: bold; color: #28a745; font-size: 22px; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ESCANEA EL PRODUCTO</h2>
    <p>Apunta al código EAN con la cámara</p>
    
    <div id="reader"></div>

    <div class="resultado-box">
        <h3>Resultado del Escaneo:</h3>
        <div id="txt-desc" class="dato"><b>DESCRIPCIÓN:</b> ---</div>
        <div id="txt-vida" class="dato"><b>Vida Útil:</b> <span id="vida-val" class="resaltado">---</span></div>
    </div>
</div>

<script>
    let baseDatos = {};

    // 1. Cargar la base de datos desde el archivo JSON
    fetch('productos.json')
        .then(response => response.json())
        .then(data => {
            baseDatos = data;
            console.log("Base de datos cargada correctamente.");
            inicializarEscanner();
        })
        .catch(err => {
            document.getElementById('txt-desc').innerHTML = "<span class='error'>Error al cargar el archivo JSON de productos.</span>";
        });

    // 2. Configurar e iniciar el escáner de la cámara
    function inicializarEscanner() {
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 150 } }
        );

        html5QrcodeScanner.render(onScanSuccess);
    }

    // 3. Qué hacer cuando la cámara detecta un código de barras
    function onScanSuccess(decodedText, decodedResult) {
        // Buscar en el JSON usando el EAN detectado
        const producto = baseDatos[decodedText];

        if (producto) {
            // Buscamos las propiedades. Si tu JSON usa mayúsculas (ej. "SKU"), cámbialas aquí abajo.
            document.getElementById('txt-desc').innerHTML = `<b>DESCRIPCIÓN:</b> ${producto.descripcion || producto.DESCRIPCION || producto.description || '---'}`;
            document.getElementById('vida-val').innerText = producto.vida_util || producto.VIDA_UTIL || '---';
            document.getElementById('vida-val').className = "resaltado";
        } else {
            document.getElementById('txt-desc').innerHTML = `<span class='error'>Producto no registrado</span>`;
            document.getElementById('vida-val').innerText = "---";
            document.getElementById('vida-val').className = "";
        }
    }
</script>
</body>
</html>
