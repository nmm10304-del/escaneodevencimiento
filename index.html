<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Almacén - Promart</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url("https://backendproyecta.proyecta.net.pe/storage/projects/1615255868.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            width: 150px;
            display: block;
            margin: 0 auto 15px;
        }
        h2 { 
            color: #ff6a00; 
            margin-top: 0; 
            font-size: 22px;
            border-bottom: 2px solid #ff6a00;
            padding-bottom: 8px;
        }
        p { color: #444; font-size: 14px; margin: 5px 0 15px; }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            min-height: 240px;
        }
        .resultado-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #fdfdfd;
            border: 1px solid #ddd;
            text-align: left;
        }
        .resultado-box h3 { margin: 0 0 10px 0; color: #ff6a00; font-size: 16px; }
        .dato { font-size: 16px; margin: 8px 0; color: #333; word-break: break-word; }
        .resaltado { font-weight: bold; color: #28a745; font-size: 20px; }
        .error { color: #dc3545; font-weight: bold; }
        .info-status { font-size: 13px; color: #666; text-align: center; margin-top: 10px; font-weight: bold; }
        
        /* SECCIÓN JULIANA EXTRAÍDA */
        .seccion-juliana {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #ff6a00;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background: #e65c00;
        }
        #resultadoJuliano {
            margin-top: 12px;
            font-weight: bold;
            font-size: 15px;
            color: #333;
            background: #fff;
            padding: 8px;
            border-radius: 5px;
            border: 1px dashed #ff6a00;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        /* Limpieza de inputs numéricos */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/11/Promart_logo_2019.svg" alt="Promart" class="logo">
    
    <h2>ESCANEA EL PRODUCTO</h2>
    <p>Apunta al código EAN con la cámara trasera</p>
    
    <div id="reader"></div>

    <div class="resultado-box">
        <h3>Resultado del Escaneo:</h3>
        <div id="txt-desc" class="dato"><b>DESCRIPCIÓN:</b> <span class="error">---</span></div>
        <div id="txt-vida" class="dato"><b>Vida Útil:</b> <span id="vida-val" class="resaltado">---</span></div>
    </div>
    <div id="txt-status" class="info-status">Conectando con las listas de almacén...</div>

    <div class="seccion-juliana">
        <h2>Consulta Juliana</h2>
        <p>Conversor de lote para validación de vigencias</p>
        
        <input type="number" id="anio" placeholder="Inserte el año (Ej: 2026)" oninput="this.value=this.value.slice(0,4)">
        <input type="number" id="juliano" placeholder="Inserte los 3 dígitos (Ej: 165)" oninput="this.value=this.value.slice(0,3)">
        
        <button onclick="convertirFechaJuliana()">Convertir Fecha</button>
        <div id="resultadoJuliano">Esperando datos...</div>
    </div>
</div>

<script>
    let baseDatosUnificada = {};
    let html5QrCode;

    // 1. Descargar las listas JSON (FV-01 y FV-02)
    function cargarDatosYArrancar() {
        Promise.all([
            fetch('FV-01.json').then(res => res.json()),
            fetch('FV-02.json').then(res => res.json())
        ])
        .then(([data1, data2]) => {
            const listaCompleta = data1.concat(data2);
            
            // Indexamos por código de barras mapeando los caracteres raros detectados
            listaCompleta.forEach(item => {
                let ean = item["CÃ³digo de barras"] || item["Código de barras"] || item["EAN"] || item["Codigo de barras"];
                if (ean) {
                    let eanLimpio = String(ean).trim();
                    baseDatosUnificada[eanLimpio] = item;
                }
            });

            document.getElementById('txt-status').innerText = "✅ Conexión con base de datos exitosa.";
            arrancarCamaraUniversal();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('txt-status').innerHTML = "<span class='error'>⚠️ Aviso: Error en archivos JSON. Iniciando cámara de respaldo.</span>";
            arrancarCamaraUniversal();
        });
    }

    // 2. Encendido forzado de cámara trasera (Compatible con Brave, Safari y Chrome)
    function arrancarCamaraUniversal() {
        html5QrCode = new Html5Qrcode("reader");
        const camaraConfig = { facingMode: { exact: "environment" } };
        const escanerConfig = { fps: 15, qrbox: { width: 280, height: 160 } };

        html5QrCode.start(camaraConfig, escanerConfig, onScanSuccess)
        .catch(err => {
            console.warn("Modo estricto no soportado, usando modo flexible:", err);
            html5QrCode.start({ facingMode: "environment" }, escanerConfig, onScanSuccess)
            .catch(err2 => {
                document.getElementById('txt-status').innerHTML = "<span class='error'>No se pudo acceder a la cámara trasera.</span>";
            });
        });
    }

    // 3. Procesamiento del código de barras escaneado
    function onScanSuccess(decodedText, decodedResult) {
        const eanEscaneado = decodedText.trim();
        const producto = baseDatosUnificada[eanEscaneado];

        if (producto) {
            let descripcion = producto["DescripciÃ³n de SKU"] || producto["Descripción de SKU"] || "Sin descripción";
            let vidaUtil = producto["FV"] || "No definida";

            document.getElementById('txt-desc').innerHTML = `<b>DESCRIPCIÓN:</b> ${descripcion}`;
            document.getElementById('vida-val').innerText = vidaUtil !== "" ? vidaUtil : "Vacío en reporte";
        } else {
            document.getElementById('txt-desc').innerHTML = `<span class='error'>Código: ${eanEscaneado} <br>Producto no registrado</span>`;
            document.getElementById('vida-val').innerText = "---";
        }
    }

    // 4. Lógica de conversión del Calendario Juliano
    function esBisiesto(anio) {
        return (anio % 4 === 0 && anio % 100 !== 0) || (anio % 400 === 0);
    }

    function convertirFechaJuliana(){
        let anio = document.getElementById("anio").value;
        let juliano = document.getElementById("juliano").value;
        let resultado = document.getElementById("resultadoJuliano");

        if(anio === "" || juliano === ""){
            resultado.innerHTML = "<span style='color: #dc3545;'>Completa los campos</span>";
            return;
        }

        anio = parseInt(anio.replace(/\D/g,''));
        juliano = parseInt(juliano.replace(/\D/g,''));

        if(isNaN(anio) || isNaN(juliano)){
            resultado.innerHTML = "<span style='color: #dc3545;'>Solo números</span>";
            return;
        }

        if(anio < 1000 || anio > 9999){
            resultado.innerHTML = "<span style='color: #dc3545;'>Año de 4 dígitos</span>";
            return;
        }

        let maxDias = esBisiesto(anio) ? 366 : 365;

        if(juliano < 1 || juliano > maxDias){
            resultado.innerHTML = `<span style='color: #dc3545;'>Días entre 1 y ${maxDias}</span>`;
            return;
        }

        let fecha = new Date(anio, 0);
        fecha.setDate(juliano);

        let dia = fecha.getDate().toString().padStart(2,'0');
        let mes = (fecha.getMonth() + 1).toString().padStart(2,'0');

        resultado.innerHTML = `📅 Fecha Real: ${dia}/${mes}/${anio}`;
    }

    // Lanzar todo al cargar la página
    window.onload = cargarDatosYArrancar;
</script>
</body>
</html>
